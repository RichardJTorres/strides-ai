[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "strides-ai"
version = "0.1.0"
description = "Local Strava coaching app powered by Claude"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "anthropic>=0.40",
    "python-dotenv>=1.0",
    "rich>=13.0",
]

[project.scripts]
strides-ai = "strides_ai.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["strides_ai"]
